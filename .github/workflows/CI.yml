name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast PR gate: sharded tests WITHOUT coverage. Coverage instrumentation is
  # ~4x slower and lives in a separate, non-blocking workflow (coverage.yml).
  test:
    name: test ubuntu - shard ${{ matrix.group }}/8
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      # NB: `Pkg.test()` defaults to --check-bounds=yes, a DIFFERENT compile
      # configuration than buildpkg's cached precompile, which forces a ~20-min
      # recompile of the whole dependency tree on every shard. --check-bounds=auto
      # reuses the restored cache, so the per-shard precompile drops to ~0.
      - name: Run tests (no coverage)
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; julia_args=["--check-bounds=auto"])'
        env:
          TEST_GROUP: ${{ matrix.group }}
          TEST_GROUPS: "8"

  # macOS runners are slow + expensive; run them only on pushes to main as a
  # platform-sanity check (no coverage), not on every PR.
  test-macos:
    name: test macos - shard ${{ matrix.group }}/8
    runs-on: macos-latest
    if: github.event_name == 'push'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        group: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run tests (no coverage)
        run: julia --color=yes --project=. -e 'using Pkg; Pkg.test(; julia_args=["--check-bounds=auto"])'
        env:
          TEST_GROUP: ${{ matrix.group }}
          TEST_GROUPS: "8"
